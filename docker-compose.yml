services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: signal_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: signal
      POSTGRES_PASSWORD: signal_secret
      POSTGRES_DB: signal_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - signal_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signal -d signal_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: signal_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: signal
      RABBITMQ_DEFAULT_PASS: signal_secret
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - signal_net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: signal_api
    restart: unless-stopped
    env_file: .env
    environment:
      RABBITMQ_URL: amqp://signal:signal_secret@rabbitmq:5672
      DATABASE_URL: postgresql://signal:signal_secret@postgres:5432/signal_db
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - signal_net

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: signal_worker
    restart: unless-stopped
    env_file: .env
    environment:
      RABBITMQ_URL: amqp://signal:signal_secret@rabbitmq:5672
      DATABASE_URL: postgresql://signal:signal_secret@postgres:5432/signal_db
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - signal_net

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: signal_web
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://signal:signal_secret@postgres:5432/signal_db
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3001:3001"
    depends_on:
      - api
    networks:
      - signal_net

networks:
  signal_net:
    driver: bridge

volumes:
  postgres_data:
